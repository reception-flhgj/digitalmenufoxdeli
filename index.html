  html, body { height: 100%; margin: 0; padding: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  /* Category pill active */
  .cat-pill.active {
    background-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(42,127,138,0.35);
  }
  .cat-pill {
    transition: all .2s ease;
    white-space: nowrap;
  }
  .cat-pill:hover { background-color: var(--accent); color: #fff; }

  /* Card hover */
  .menu-card {
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .menu-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.12);
  }

  /* Cart slide */
  #cart-panel {
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    max-height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    z-index: 40;
  }
  #cart-panel.hidden-panel { transform: translateX(100%); visibility: hidden; }
  #cart-panel.visible-panel { transform: translateX(0); visibility: visible; }
  
  @media (max-width: 640px) {
    #cart-panel {
      width: 90%;
      max-width: 320px;
      height: auto;
      max-height: 85vh;
      left: 50%;
      right: auto;
      top: 50%;
      transform: translate(-50%, -50%) translateX(100%);
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    #cart-panel.hidden-panel { transform: translate(-50%, -50%) translateX(100%); visibility: hidden; }
    #cart-panel.visible-panel { transform: translate(-50%, -50%) translateX(0); visibility: visible; }
  }

  /* Overlay */
  #cart-overlay {
    transition: opacity .3s ease;
  }

  /* Modal */
  #option-modal {
    transition: opacity .2s ease;
  }

  /* Badge pulse */
  @keyframes badge-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .badge-pop { animation: badge-pop .3s ease; }

  /* Hero gradient */
  .hero-gradient {
    background: linear-gradient(135deg, #0d4f58 0%, #1a7a88 50%, #2a9aaa 100%);
  }

  /* Allergen tag */
  .allergen-tag {
    font-size: 10px;
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* Price color */
  .price-text { color: var(--action); font-weight: 600; }

  .section-hidden { display: none !important; }

  /* Sticky header shadow */
  .sticky-header {
    backdrop-filter: blur(10px);
    background: rgba(171,224,228,0.92);
  }

  .btn-action {
    background-color: var(--action);
    color: #fff;
    transition: background .2s;
  }
  .btn-action:hover { background-color: #c44f22; }

  .btn-accent {
    background-color: var(--accent);
    color: #fff;
    transition: background .2s;
  }
  .btn-accent:hover { background-color: #1f6570; }

  .qty-btn {
    background: var(--bg);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; cursor: pointer;
    transition: all .15s;
  }
  .qty-btn:hover { background: var(--accent); color: #fff; }

  /* Radio custom */
  .opt-radio { display: none; }
  .opt-label {
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid #ccc;
    font-size: 13px;
    transition: all .15s;
    user-select: none;
  }
  .opt-radio:checked + .opt-label {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Toast */
  #toast {
    transition: opacity .3s, transform .3s;
  }

  #option-modal {
    display: flex !important;

    border-radius: 1.5rem;
    overflow-y: auto;
    margin: auto;

// ─── STATE ────────────────────────────────────────────────────────────────
let cart = [];
let cartOpen = false;
let modalItem = null;
let modalQty = 1;
let modalOptions = {};
let activeCategory = "all";
let cartIdCounter = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────
function init() {
  buildCategoryPills();
  buildMenu();
  lucide.createIcons();
}

// ─── BUILD CATEGORY PILLS ─────────────────────────────────────────────────
function buildCategoryPills() {
  const strip = document.getElementById("cat-strip");
  strip.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-pill flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium border border-transparent bg-white bg-opacity-60" + (cat.id === "all" ? " active" : "");
    btn.setAttribute("data-cat", cat.id);
    btn.textContent = cat.label;
    btn.onclick = function() { filterCategory(cat.id); };
    strip.appendChild(btn);
  });
}

function filterCategory(id) {
  activeCategory = id;
  document.querySelectorAll(".cat-pill").forEach(p => {
    p.classList.toggle("active", p.getAttribute("data-cat") === id);
  });
  document.querySelectorAll(".menu-section").forEach(sec => {
    const secId = sec.getAttribute("data-section");
    sec.classList.toggle("section-hidden", id !== "all" && id !== secId);
  });
  lucide.createIcons();
}

// ─── BUILD MENU ───────────────────────────────────────────────────────────
function fmt(n) { return "Rp " + n.toLocaleString("id-ID"); }

function buildMenu() {
  const root = document.getElementById("menu-root");
  root.innerHTML = "";
  
  MENU.forEach(function(cat) {
    const section = document.createElement("section");
    section.className = "menu-section mt-8";
    section.setAttribute("data-section", cat.id);

    const header = document.createElement("div");
    header.className = "flex items-center gap-3 mb-4";
    header.innerHTML = `<div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-sm" style="background:white">${cat.emoji}</div><div><h2 class="text-xl font-bold" style="font-family:'Playfair Display',serif;color:var(--text)">${cat.title}</h2><p class="text-xs" style="color:var(--accent)">${cat.desc}</p></div>`;
    section.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4";

    cat.items.forEach(function(item) {
      const allergens = getAllergens(item.name);
      const hasOptions = item.hotice || item.coffee || item.sugar || item.extra_rice;

      const card = document.createElement("div");
      card.className = "menu-card bg-white rounded-2xl overflow-hidden shadow-sm border border-white cursor-pointer";
      
      const allergenHTML = allergens.length > 0
        ? `<div class="flex flex-wrap gap-1 mt-2">${allergens.map(function(a) { return `<span class="allergen-tag">⚠️ ${L(a)}</span>`; }).join("")}</div>`
        : "";

      const optBadge = hasOptions
        ? `<span class="text-xs rounded-full px-2 py-0.5" style="background:var(--bg);color:var(--accent)">⚙️ ${LANG==="id"?"Pilihan":"Options"}</span>`
        : "";

      card.innerHTML = `<div class="p-4"><div class="flex justify-between items-start gap-2"><h3 class="font-semibold text-sm leading-snug" style="color:var(--text);flex:1">${item.name}</h3>${optBadge}</div>${allergenHTML}<div class="flex items-center justify-between mt-3"><span class="price-text text-sm">${fmt(item.price)}</span><button class="w-8 h-8 rounded-full flex items-center justify-center btn-action shadow-sm" type="button"><i data-lucide="plus" style="width:14px;height:14px"></i></button></div></div>`;
      
      (function(currentItem) {
        const clickHandler = function() { openModal(currentItem); };
        card.addEventListener("click", clickHandler);
        const btn = card.querySelector("button");
        if (btn) {
          btn.addEventListener("click", function(e) {
            e.stopPropagation();
            clickHandler();
          });
        }
      })(item);
      
      grid.appendChild(card);
    });

    section.appendChild(grid);
    root.appendChild(section);
  });
  
  lucide.createIcons();
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function openModal(item) {
  modalItem = item;
  modalQty = 1;
  modalOptions = {};

  document.getElementById("modal-title").textContent = item.name;
  updateModalPrice();

  const body = document.getElementById("modal-body");
  body.innerHTML = "";

  const basePrice = document.createElement("div");
  basePrice.className = "mb-4 text-sm text-gray-500";
  basePrice.textContent = (LANG==="id"?"Harga dasar: ":"Base price: ") + fmt(item.price);
  body.appendChild(basePrice);

  if (item.hotice) {
    const wrap = buildRadioGroup(
      LANG==="id"?"Pilih Suhu *":"Temperature *",
      "temp",
      [{v:"Hot",l:"🔥 Hot"},{v:"Iced",l:"🧊 Iced"}],
      true
    );
    body.appendChild(wrap);
  }

  if (item.sugar) {
    const wrap = buildRadioGroup(
      LANG==="id"?"Tingkat Gula":"Sugar Level",
      "sugar",
      [
        {v:"No Sugar",l:(LANG==="id"?"Tanpa Gula":"No Sugar")},
        {v:"Less",l:(LANG==="id"?"Sedikit":"Less")},
        {v:"Normal",l:"Normal"},
        {v:"Extra",l:(LANG==="id"?"Extra Manis":"Extra Sweet")},
      ],
      false
    );
    body.appendChild(wrap);
  }

  if (item.coffee && !item.no_sugar_opt) {
    const wrap = document.createElement("div");
    wrap.className = "mb-4";
    wrap.innerHTML = `<p class="text-xs font-bold uppercase tracking-wide mb-2" style="color:var(--accent)">${LANG==="id"?"Tambahan Espresso":"Extra Espresso"}</p><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="extra-shot" class="accent-teal-600 w-4 h-4" onchange="modalOptions.extra_shot=this.checked;updateModalPrice()"/><span>Extra Shot Espresso <span class="price-text">+${fmt(10000)}</span></span></label>`;
    body.appendChild(wrap);
  }

  if (item.extra_rice) {
    const wrap = document.createElement("div");
    wrap.className = "mb-4";
    wrap.innerHTML = `<p class="text-xs font-bold uppercase tracking-wide mb-2" style="color:var(--accent)">${LANG==="id"?"Tambahan":"Add-on"}</p><label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" id="extra-rice" class="accent-teal-600 w-4 h-4" onchange="modalOptions.extra_rice=this.checked;updateModalPrice()"/><span>${LANG==="id"?"Tambah Nasi Putih":"Extra White Rice"} <span class="price-text">+${fmt(10000)}</span></span></label>`;
    body.appendChild(wrap);
  }

  const allergens = getAllergens(item.name);
  if (allergens.length > 0) {
    const wrap = document.createElement("div");
    wrap.className = "rounded-xl p-3 mt-2 text-xs";
    wrap.style.background = "#fff9e6";
    wrap.style.border = "1px solid #ffc107";
    wrap.innerHTML = `<p class="font-bold mb-1" style="color:#856404">⚠️ ${LANG==="id"?"Info Alergen":"Allergen Info"}</p><p style="color:#856404">${LANG==="id"?"Mengandung:":"Contains:"} ${allergens.map(function(a){return L(a);}).join(", ")}</p>`;
    body.appendChild(wrap);
  }

  document.getElementById("modal-qty").textContent = "1";
  const modal = document.getElementById("option-modal");
  modal.classList.remove("hidden");
  modal.style.display = "flex";
  lucide.createIcons();
}

function buildRadioGroup(label, name, options, required) {
  const wrap = document.createElement("div");
  wrap.className = "mb-4";
  const lbl = document.createElement("p");
  lbl.className = "text-xs font-bold uppercase tracking-wide mb-2";
  lbl.style.color = "var(--accent)";
  lbl.textContent = label;
  wrap.appendChild(lbl);
  const row = document.createElement("div");
  row.className = "flex flex-wrap gap-2";
  options.forEach(function(opt, i) {
    const uid = "opt_" + name + "_" + i + "_" + Date.now();
    const inp = document.createElement("input");
    inp.type = "radio";
    inp.name = "modal_" + name;
    inp.value = opt.v;
    inp.id = uid;
    inp.className = "opt-radio";
    (function(val) {
      inp.onchange = function() { modalOptions[name] = val; updateModalPrice(); };
    })(opt.v);
    const lbl2 = document.createElement("label");
    lbl2.htmlFor = uid;
    lbl2.className = "opt-label";
    lbl2.textContent = opt.l;
    row.appendChild(inp);
    row.appendChild(lbl2);
  });
  wrap.appendChild(row);
  return wrap;
}

function updateModalPrice() {
  let p = modalItem ? modalItem.price : 0;
  if (modalOptions.extra_shot) p += 10000;
  if (modalOptions.extra_rice) p += 10000;
  document.getElementById("modal-price").textContent = fmt(p * modalQty);
}

function changeModalQty(d) {
  modalQty = Math.max(1, modalQty + d);
  document.getElementById("modal-qty").textContent = modalQty;
  updateModalPrice();
}

function closeModal() {
  const modal = document.getElementById("option-modal");
  modal.classList.add("hidden");
  modal.style.display = "none";
  modalItem = null;
}

function addToCartFromModal() {
  if (!modalItem) return;
  if (modalItem.hotice && !modalOptions.temp) {
    showToast(LANG==="id"?"Pilih suhu terlebih dahulu!":"Please choose Hot or Iced!", true);
    return;
  }

  let price = modalItem.price;
  let optParts = [];
  if (modalOptions.temp) optParts.push(modalOptions.temp);
  if (modalOptions.sugar) optParts.push((LANG==="id"?"Gula: ":"Sugar: ") + modalOptions.sugar);
  if (modalOptions.extra_shot) { price += 10000; optParts.push("+Extra Shot"); }
  if (modalOptions.extra_rice) { price += 10000; optParts.push(LANG==="id"?"+Nasi Putih":"+White Rice"); }

  const optStr = optParts.join(" | ");

  const existing = cart.find(function(c) { return c.name === modalItem.name && c.optStr === optStr; });
  if (existing) {
    existing.qty += modalQty;
    existing.price = price;
  } else {
    cart.push({ id: ++cartIdCounter, name: modalItem.name, price: price, qty: modalQty, optStr: optStr });
  }

  closeModal();
  updateCartUI();
  showToast(modalItem.name + " " + (LANG==="id"?"ditambahkan!":"added!"));
}

function quickAdd(item) {
  const existing = cart.find(function(c) { return c.name === item.name && !c.optStr; });
  if (existing) { existing.qty++; }
  else { cart.push({ id: ++cartIdCounter, name: item.name, price: item.price, qty: 1, optStr:"" }); }
  updateCartUI();
  showToast(item.name + " added!");
}

// ─── CART UI ──────────────────────────────────────────────────────────────
function updateCartUI() {
  const total = cart.reduce(function(s, c) { return s + c.price * c.qty; }, 0);
  const count = cart.reduce(function(s, c) { return s + c.qty; }, 0);

  const badge = document.getElementById("cart-badge");
  if (count > 0) {
    badge.textContent = count > 99 ? "99+" : count;
    badge.classList.remove("hidden");
    badge.classList.add("badge-pop");
    setTimeout(function() { badge.classList.remove("badge-pop"); }, 300);
  } else {
    badge.classList.add("hidden");
  }

  document.getElementById("cart-total").textContent = fmt(total);

  const container = document.getElementById("cart-items");
  const empty = document.getElementById("cart-empty");
  if (cart.length === 0) {
    empty.style.display = "";
    container.querySelectorAll(".cart-row").forEach(function(e) { e.remove(); });
  } else {
    empty.style.display = "none";
    const existing = new Map([...container.querySelectorAll(".cart-row")].map(function(e) { return [parseInt(e.dataset.cartId), e]; }));
    let prevEl = empty;
    cart.forEach(function(item) {
      if (existing.has(item.id)) {
        const el = existing.get(item.id);
        el.querySelector(".cart-item-qty").textContent = item.qty;
        el.querySelector(".cart-item-total").textContent = fmt(item.price * item.qty);
        existing.delete(item.id);
        prevEl = el;
      } else {
        const el = document.createElement("div");
        el.className = "cart-row bg-gray-50 rounded-xl p-3 border border-gray-100";
        el.dataset.cartId = item.id;
        el.innerHTML = `<div class="flex justify-between items-start gap-2"><div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" style="color:var(--text)">${item.name}</p>${item.optStr ? `<p class="text-xs text-gray-400 mt-0.5">${item.optStr}</p>` : ""}</div><button class="remove-btn text-gray-300 hover:text-red-400 flex-shrink-0"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button></div><div class="flex items-center justify-between mt-2"><div class="flex items-center gap-2"><div class="qty-btn minus-btn">−</div><span class="cart-item-qty font-bold text-sm w-5 text-center">${item.qty}</span><div class="qty-btn plus-btn">+</div></div><span class="cart-item-total price-text text-sm">${fmt(item.price * item.qty)}</span></div>`;
        (function(cartItem) {
          el.querySelector(".remove-btn").addEventListener("click", function() { removeFromCart(cartItem.id); });
          el.querySelector(".minus-btn").addEventListener("click", function() { changeCartQty(cartItem.id, -1); });
          el.querySelector(".plus-btn").addEventListener("click", function() { changeCartQty(cartItem.id, 1); });
        })(item);
        prevEl.after(el);
        prevEl = el;
        existing.delete(item.id);
      }
    });
    existing.forEach(function(el) { el.remove(); });
  }
  lucide.createIcons();
}

function changeCartQty(id, d) {
  const item = cart.find(function(c) { return c.id === id; });
  if (!item) return;
  item.qty = Math.max(0, item.qty + d);
  if (item.qty === 0) cart = cart.filter(function(c) { return c.id !== id; });
  updateCartUI();
}

function removeFromCart(id) {
  cart = cart.filter(function(c) { return c.id !== id; });
  updateCartUI();
}

// ─── TOGGLE CART ──────────────────────────────────────────────────────────
function toggleCart() {
  cartOpen = !cartOpen;
  const panel = document.getElementById("cart-panel");
  const overlay = document.getElementById("cart-overlay");
  if (cartOpen) {
    overlay.classList.remove("hidden");
    panel.classList.remove("hidden-panel");
    panel.classList.add("visible-panel");
  } else {
    overlay.classList.add("hidden");
    panel.classList.remove("visible-panel");
    panel.classList.add("hidden-panel");
  }
  lucide.createIcons();
}

// ─── CHECKOUT ─────────────────────────────────────────────────────────────
function checkout() {
  const guestName = document.getElementById("guest-name").value.trim();
  const locDetail = document.getElementById("location-detail").value.trim();
  const locType = document.querySelector('input[name="location_type"]:checked');
  const notes = document.getElementById("order-notes").value.trim();

  if (!guestName) {
    showToast(LANG==="id"?"Isi nama tamu dahulu!":"Please enter your name!", true);
    document.getElementById("guest-name").focus();
    return;
  }
  if (!locType) {
    showToast(LANG==="id"?"Pilih lokasi pesanan!":"Please select table or room!", true);
    return;
  }
  if (!locDetail) {
    showToast(LANG==="id"?"Isi nomor meja / kamar!":"Please enter table or room number!", true);
    document.getElementById("location-detail").focus();
    return;
  }
  if (cart.length === 0) {
    showToast(LANG==="id"?"Keranjang masih kosong!":"Cart is empty!", true);
    return;
  }

  const locLabel = locType.value === "table" ? (LANG==="id"?"Meja":"Table") : (LANG==="id"?"Kamar":"Room");
  let msg = "🦊 *FOX DELI ORDER*\n";
  msg += "👤 " + (LANG==="id"?"Nama":"Name") + ": " + guestName + "\n";
  msg += "📍 " + locLabel + ": " + locDetail + "\n";
  msg += "\n*🛒 " + (LANG==="id"?"Pesanan":"Order") + ":*\n";
  cart.forEach(function(item, i) {
    msg += (i+1) + ". " + item.name;
    if (item.optStr) msg += " (" + item.optStr + ")";
    msg += " x" + item.qty + " — " + fmt(item.price * item.qty) + "\n";
  });
  const total = cart.reduce(function(s, c) { return s + c.price * c.qty; }, 0);
  msg += "\n💰 *Total: " + fmt(total) + "*";
  if (notes) msg += "\n\n📝 " + (LANG==="id"?"Catatan":"Notes") + ": " + notes;
  msg += "\n\n_" + (LANG==="id"?"Terima kasih sudah memesan di FOX DELI! 🦊":"Thank you for ordering at FOX DELI! 🦊") + "_";

  const waNum = WA_NUMBER || (window.elementSdk && window.elementSdk.config ? window.elementSdk.config.whatsapp_number : "") || "";
  const url = "https://wa.me/" + waNum + "?text=" + encodeURIComponent(msg);
  window.open(url, "_blank", "noopener,noreferrer");
}

// ─── TOAST ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError) {
  isError = isError || false;
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = isError ? "#dc2626" : "#1a2e35";
  t.style.opacity = "1";
  t.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    t.style.opacity = "0";
    t.style.transform = "translateX(-50%) translateY(10px)";
  }, 2500);
}

// ─── LOCATION UI ──────────────────────────────────────────────────────────
function updateLocationUI() {
  const tableWrap = document.getElementById("loc-table-wrap");
  const roomWrap = document.getElementById("loc-room-wrap");
  const tableChecked = document.getElementById("loc-table").checked;
  const roomChecked = document.getElementById("loc-room").checked;
  tableWrap.style.borderColor = tableChecked ? "var(--accent)" : "#e5e7eb";
  roomWrap.style.borderColor = roomChecked ? "var(--accent)" : "#e5e7eb";

    : (LANG==="id"?"Nomor kamar (cth. Kamar 302)":"Room number (e.g. Room 302)");
}

        ["footer_text", config.footer_text || defaultConfig.footer_text],
      ]);
    },
  });
}
